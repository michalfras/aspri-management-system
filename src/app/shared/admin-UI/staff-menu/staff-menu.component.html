@let user = (user$ | async);
<!--  -->
@if(isAccountMenuOpen){
<div class="blur-wrapper" (click)="toggleMenu()"></div>
}
<div class="account-menu">
  <div (click)="toggleMenu()"><i class="fa-solid fa-circle-user"></i></div>
  @if(!isAccountMenuOpen){
  <span class="role">{{ user ? user.role : "" }}</span
  >}@else{
  <p class="user-name">
    {{ user ? `Witaj ${user?.name}` : "Zaloguj się" }}
  </p>
  }
</div>
<div class="account-menu-content" [class.visible]="isAccountMenuOpen">
  @if(user){
  <div class="admin-panel-wrapper">
    <app-account-menu [user]="user"></app-account-menu>
  </div>
  } @else{
  <div class="login-panel-wrapper"><app-login-panel></app-login-panel></div>
  }
</div>
